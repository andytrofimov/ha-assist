substitutions:
  device_name: waveshare-audio-board
  friendly: Waveshare-Audio-3

  # Phases of the Voice Assistant
  voice_assist_idle_phase_id: '1' # ready to be triggered by a wake word
  voice_assist_waiting_for_command_phase_id: '2' # waiting for a voice command (after being triggered by the wake word)
  voice_assist_listening_for_command_phase_id: '3' # listening for a voice command
  voice_assist_thinking_phase_id: '4' # processing the command
  voice_assist_replying_phase_id: '5' # replying to the command
  voice_assist_not_ready_phase_id: '10' # not ready
  voice_assist_error_phase_id: '11' #encountered an error

  i2s_mclk: GPIO12
  i2s_bclk: GPIO13 #SCLK
  i2s_lrclk: GPIO14 #LRCK/WS

  amp_ctrl: 8 #9 #Extended IO pin that controls the PA_EN on the TCA9555
  i2c_scl: GPIO10
  i2c_sda: GPIO11

  #mic lookup
  mic_channel_0: 'left'
  mic_channel_1: 'right' # mic wont allow right
  mic_channel_2: 'stereo' # voice assistant does not support stereo

  #WORKING
  which_mic: 0 #0=left, 1=right, 2=stereo
  i2s_sample_rate: 16000 # Works as in sync with microphone (mic must have 16000 for voice assistant)
  i2s_bits_per_sample: 32
  #i2s_bits_per_sample: 16
  i2s_mode_mic: secondary
  i2s_mode_speaker: secondary
  i2s_use_apll: true
  i2s_bps_spk: 16bit
  i2s_bps_mic: 16bit
  i2s_mclk_multiple: 256 # 128, 256, 384, 512

  hidden_ssid: "false"
  led_num: '7' # WS2812 ring leds

# Pre-configured camera code
# exposes UI controls to Homeassistant
# ====================================
#packages: # REMOTE (GIT)
#  remote_package_shorthand: github://esphome/sw3Dan/waveshare-s2-audio_esphome_voice/waveshare_camera_pkg.yaml@main
#packages: # LOCAL FILE
#  dynamic-cam: !include
#    file: waveshare_camera_pkg.yaml

esphome:
  name: $device_name
  friendly_name: $friendly
  min_version: 2025.8.0
  on_boot:
    - priority: 375
      then:
        - script.execute: control_leds
        - delay: 10min
        - if:
            condition:
              lambda: return id(init_in_progress);
            then:
              - lambda: id(init_in_progress) = false;
              - script.execute: control_leds

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240MHz
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"

      # Considerably speeds up mWW at the cost of using more PSRAM.
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"  # TLS1.3 support isn't enabled by default in IDF 5.1.5

wifi:
  id: wifi_id
  fast_connect: ${hidden_ssid}
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none  # Disable power saving for better performance
  reboot_timeout: 10min  # Prevent unnecessary reboots
  on_connect:
    - lambda: id(improv_ble_in_progress) = false;
    - script.execute: control_leds
  on_disconnect:
    - script.execute: control_leds

#network:
#  enable_ipv6: true

debug:
  update_interval: 5s

logger:
  level: DEBUG

api:
  id: api_id
  actions:
    - action: set_led_color
      variables:
        red: float
        green: float
        blue: float
      then:
        - lambda: |-
            id(led_ring_color_r) = std::min(1.0f, std::max(0.0f, red));
            id(led_ring_color_g) = std::min(1.0f, std::max(0.0f, green));
            id(led_ring_color_b) = std::min(1.0f, std::max(0.0f, blue));
    - action: start_va
      then:
        - voice_assistant.start
    - action: stop_va
      then:
        - voice_assistant.stop
  on_client_connected:
    - script.execute: control_leds
  on_client_disconnected:
    - script.execute: control_leds

  encryption:
    key: !secret api_esp32-audio-s3

# http_request:
#   verify_ssl: false

ota:
  - platform: esphome
    id: ota_esphome
    password: !secret ota_password

i2c:
  - id: internal_i2c
    sda: GPIO11
    scl: GPIO10
    scan: true
    frequency: 100kHz

# I/O Expander that controls the amplifier enable pin
tca9555:
  id: ioexp
  i2c_id: internal_i2c
  address: 0x20

psram:
  mode: octal
  speed: 80MHz

light:
  - platform: esp32_rmt_led_strip
    id: status_ring
    name: "Status Ring"
    pin: GPIO38
    num_leds: ${led_num}
    chipset: WS2812
    rgb_order: RGB
    default_transition_length: 150ms
    effects:
      - pulse:
          name: "Pulse Slow"
          min_brightness: 30%
          max_brightness: 100%
          transition_length: 1000ms
          update_interval: 16ms
      - pulse:
          name: "Pulse Medium"
          min_brightness: 30%
          max_brightness: 100%
          transition_length: 600ms
          update_interval: 16ms
      - pulse:
          name: "Pulse Fast"
          min_brightness: 30%
          max_brightness: 100%
          transition_length: 300ms
          update_interval: 16ms
      - addressable_color_wipe:
          name: "Blue Violet Pink"
          colors:
            - red: 0%
              green: 20%
              blue: 100%
              num_leds: 2
            - red: 55%
              green: 0%
              blue: 100%
              num_leds: 2
            - red: 100%
              green: 0%
              blue: 45%
              num_leds: 3
          add_led_interval: 120ms
          reverse: false
      - addressable_color_wipe:
          name: "Wipe"

i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin:
      number: $i2s_lrclk
      allow_other_uses: true
    i2s_bclk_pin:
      number: $i2s_bclk
      allow_other_uses: true
    i2s_mclk_pin:
      number: $i2s_mclk

  - id: i2s_input
    i2s_lrclk_pin:
      number: $i2s_lrclk
      allow_other_uses: true
    i2s_bclk_pin:
      number: $i2s_bclk
      allow_other_uses: true

audio_adc:
  - platform: es7210
    id: adc_mic
    i2c_id: internal_i2c
    sample_rate: $i2s_sample_rate
    bits_per_sample: $i2s_bps_mic
    #bits_per_sample: "${i2s_bits_per_sample}bit"

# external_components:
#   - source:
#       type: local
#       path: components
#     components: [ es8311 ]
external_components:
  - source: github://pr#15628
    components: [ micro_wake_word ]
    refresh: 0s
  - source:
      type: git
      url: "https://github.com/sw3Dan/waveshare-s2-audio_esphome_voice"
      ref: main
    components: [ es8311 ]
    refresh: 0s

audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: internal_i2c
    use_mclk: true
    sample_rate: $i2s_sample_rate
    bits_per_sample: $i2s_bps_spk
    #bits_per_sample: "${i2s_bits_per_sample}bit"
    force_master: true
    mclk_multiple: $i2s_mclk_multiple

microphone:
  - platform: i2s_audio
    id: i2s_mics
    i2s_din_pin: GPIO15
    adc_type: external
    pdm: false
    i2s_audio_id: i2s_input
    i2s_mode: $i2s_mode_mic

    #sample_rate: $i2s_sample_rate
    sample_rate: 16000

    bits_per_sample: $i2s_bps_mic
    #bits_per_sample: "${i2s_bits_per_sample}bit"

    use_apll: $i2s_use_apll
    mclk_multiple: $i2s_mclk_multiple
    #channel: stereo
    channel: ${mic_channel_${which_mic}}

speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    i2s_dout_pin: GPIO16

    i2s_audio_id: i2s_output
    i2s_mode: secondary #using the patched es8311

    dac_type: external
    timeout: never
    buffer_duration: 100ms
    audio_dac: es8311_dac
    sample_rate: $i2s_sample_rate
    #bits_per_sample: "${i2s_bits_per_sample}bit"
    #bits_per_sample: $i2s_bps_spk
    bits_per_sample: 16bit #TEMP FIX
    use_apll: $i2s_use_apll
    mclk_multiple: $i2s_mclk_multiple
    #channel: mono #WORKS
    channel: stereo #WORKS #TEST: STREAM ERROR
    #channel: ${mic_channel_${which_mic}}

  # Virtual speakers to combine the announcement and media streams together into one output
  - platform: mixer
    id: mixing_speaker
    output_speaker: i2s_audio_speaker
    num_channels: 2
    source_speakers:
      - id: announcement_mixing_input
        timeout: never
      - id: media_mixing_input
        timeout: never

  # Vritual speakers to resample each pipelines' audio, if necessary, as the mixer speaker requires the same sample rate
  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input

media_player:
  - platform: speaker
    id: external_media_player
    name: None
    internal: False
    volume_increment: 0.01
    volume_min: 0.4
    volume_max: 0.8
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      format: FLAC     # FLAC is the least processor intensive codec
      num_channels: 1  # Stereo audio is unnecessary for announcements
      sample_rate: 48000 #Supported by Music Assistant
    media_pipeline:
      speaker: media_resampling_speaker
      format: FLAC     # FLAC is the least processor intensive codec
      sample_rate: 48000
    on_announcement:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 20
          duration: 0.0s
    on_state:
      if:
        condition:
          and:
            - not:
                voice_assistant.is_running:
            - not:
                media_player.is_announcing:
        then:
          - mixer_speaker.apply_ducking:
              id: media_mixing_input
              decibel_reduction: 0
              duration: 1.0s
    on_volume:
      if:
        condition:
          - lambda: return !id(init_in_progress);
        then:
          - delay: 100ms  # Debounce
          - script.execute: control_leds_volume_changed
    files:
      - id: wake_word_triggered_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/wake_word_triggered.flac
      # - id: error_cloud_expired
      #   file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/error_cloud_expired.mp3

voice_assistant:
  id: va
  microphone:
    id: va_mic
    microphone: i2s_mics
    #channels: 1 #Right
    #channels: 0 #Left
    channels: $which_mic #correct that it's left/right cannel OR number of channels?
  media_player: external_media_player
  micro_wake_word: mww
  use_wake_word: false
  noise_suppression_level: 0 #2 #0
  auto_gain: 0 dbfs
  volume_multiplier: 1
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - micro_wake_word.start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
  on_client_disconnected:
    - voice_assistant.stop:
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: control_leds
  on_error:
    # Only set the error phase if the error code is different than duplicate_wake_up_detected or stt-no-text-recognized
    # These two are ignored for a better user experience
    - if:
        condition:
          and:
            - lambda: return !id(init_in_progress);
            - lambda: return code != "duplicate_wake_up_detected";
            - lambda: return code != "stt-no-text-recognized";
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: control_leds
    # If the error code is cloud-auth-failed, serve a local audio file guiding the user.
    # - if:
    #     condition:
    #       - lambda: return code == "cloud-auth-failed";
    #     then:
    #       - script.execute:
    #           id: play_sound
    #           priority: true
    #           sound_file: !lambda return id(error_cloud_expired);
  # When the voice assistant starts: Play a wake up sound, duck audio.
  on_start:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 30 #20  # Number of dB quieter; higher implies more quiet, 0 implies full volume
        duration: 0.0s         # The duration of the transition (default is no transition)
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: control_leds
  on_intent_progress:
    - if:
        condition:
          # A nonempty x variable means a streaming TTS url was sent to the media player
          lambda: 'return !x.empty();'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
          # Start a script that would potentially enable the stop word if the response is longer than a second
          - script.execute: activate_stop_word_once
  on_tts_start:
    - if:
        condition:
          # The intent_progress trigger didn't start the TTS Reponse
          lambda: 'return id(voice_assistant_phase) != ${voice_assist_replying_phase_id};'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
          # Start a script that would potentially enable the stop word if the response is longer than a second
          - script.execute: activate_stop_word_once
  on_tts_end:
    - script.execute:
        id: send_tts_uri_event
        tts_uri: !lambda 'return x;'
  on_stt_end:
    - script.execute:
        id: send_stt_text_event
        stt_text: !lambda 'return x;'

  # When the voice assistant ends ...
  on_end:
    - wait_until:
        not:
          voice_assistant.is_running:
    # Stop ducking audio.
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1.0s
    # If the end happened because of an error, let the error phase on for a second
    - if:
        condition:
          lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
        then:
          - delay: 1s
    # Reset the voice assistant phase id and reset the LED animations.
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds

micro_wake_word:
  id: mww
  microphone:
    microphone: i2s_mics
    channels: $which_mic
    #gain_factor: 4
  stop_after_detection: false
  models:
    - model: okay_nabu
      id: okay_nabu
    - model: alexa
      id: alexa
    - model: https://github.com/kahrendt/microWakeWord/releases/download/stop/stop.json
      id: stop
      internal: true

  on_wake_word_detected:
    - if:
        condition:
          voice_assistant.is_running:
        then:
          - voice_assistant.stop:
        else:
          - if:
              condition:
                media_player.is_announcing:
              then:
                - media_player.stop:
                    announcement: true
              else:
                - if:
                    condition:
                      switch.is_on: wake_sound
                    then:
                      - script.execute:
                          id: play_sound
                          priority: true
                          sound_file: !lambda return id(wake_word_triggered_sound);
                      - delay: 300ms
                - voice_assistant.start:
                    wake_word: !lambda return wake_word;

globals:
  - id: led_ring_color_r
    type: float
    restore_value: yes
    initial_value: '1.0'
  - id: led_ring_color_g
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: led_ring_color_b
    type: float
    restore_value: yes
    initial_value: '1.0'
  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: improv_ble_in_progress
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}


script:
  # Minimal dispatcher for LEDs: off / solid / built-in effects
  - id: led_set_effect
    mode: restart
    parameters:
      effect: std::string
      r: float
      g: float
      b: float
    then:
      - lambda: |-
          id(led_ring_color_r) = r;
          id(led_ring_color_g) = g;
          id(led_ring_color_b) = b;
          ESP_LOGI("led", "led_set_effect: effect='%s' rgb(%.2f, %.2f, %.2f) brightness=%.2f",
                   effect.c_str(), r, g, b, (float) id(led_ring_brightness).state);
      - if:
          condition:
            lambda: 'return effect == "off";'
          then:
            - light.turn_off: status_ring
          else:
            - if:
                condition:
                  lambda: 'return effect == "solid";'
                then:
                  - light.turn_on:
                      id: status_ring
                      brightness: !lambda 'return id(led_ring_brightness).state;'
                      red: !lambda 'return id(led_ring_color_r);'
                      green: !lambda 'return id(led_ring_color_g);'
                      blue: !lambda 'return id(led_ring_color_b);'
                else:
                  - light.turn_on:
                      id: status_ring
                      brightness: !lambda 'return id(led_ring_brightness).state;'
                      red: !lambda 'return id(led_ring_color_r);'
                      green: !lambda 'return id(led_ring_color_g);'
                      blue: !lambda 'return id(led_ring_color_b);'
                      effect: !lambda 'return effect;'

  # Single LED state machine (small footprint)
  - id: control_leds
    mode: single
    then:
      - lambda: |-
          const bool wifi_connected = id(wifi_id).is_connected();
          const bool api_connected  = id(api_id).is_connected();
          const bool improv_ble     = id(improv_ble_in_progress);
          const bool init_progress  = id(init_in_progress);
          const int  phase          = id(voice_assistant_phase);

          ESP_LOGD("led",
                   "control_leds: wifi=%d api=%d improv=%d init=%d phase=%d",
                   (int)wifi_connected, (int)api_connected, (int)improv_ble, (int)init_progress,
                   phase);

          auto set = [&](const char* effect, float r, float g, float b) {
            id(led_set_effect).execute(effect, r, g, b);
          };

          if (improv_ble) {                          // Provisioning
            set("Pulse Medium", 1.0, 0.89, 0.71);    // warm white
            return;
          }
          if (init_progress) {                       // Boot/init
            //if (wifi_connected) set("Pulse Fast", 0.09, 0.73, 0.95); else set("Pulse Slow", 0.09, 0.73, 0.95);
            set("Blue Violet Pink", 0.1, 0.0, 1.0);
            id(play_sound).execute(1, id(wake_word_triggered_sound)); //TEST
            return;
          }
          if (!wifi_connected || !api_connected) {   // HA disconnected
            set("Pulse Medium", 1.0, 0.0, 0.0);
            return;
          }

          // Voice assistant phases
          switch (phase) {
            case ${voice_assist_waiting_for_command_phase_id}: // just woke
              set("Pulse Slow", 0.5, 0.0, 0.5);
              return;
            case ${voice_assist_listening_for_command_phase_id}:
              set("Pulse Slow", 0.8, 0.0, 0.8);
              return;
            case ${voice_assist_thinking_phase_id}:
              set("Pulse Fast", 0.6, 0.0, 0.6);
              return;
            case ${voice_assist_replying_phase_id}:
              set("Wipe", 0.6, 0.0, 0.6);
              return;
            case ${voice_assist_error_phase_id}:
              set("Pulse Fast", 1.0, 0.0, 0.0);
              return;
            case ${voice_assist_not_ready_phase_id}:
              set("Pulse Slow", 1.0, 0.0, 0.0);
              return;
            default: break;
          }

          // Idle
          set("off", 0, 0, 0);

  # Brief green pulse when volume changes, then restore
  - id: control_leds_volume_changed
    mode: restart
    then:
      - light.turn_on:
          id: status_ring
          brightness: !lambda 'return id(led_ring_brightness).state;'
          red: 0.0
          green: 1.0
          blue: 0.0
          effect: "Pulse Fast"
      - lambda: |-
          ESP_LOGD("led", "volume_changed: flash green"); //DEBUG
      - delay: 1.2s
      - script.execute: control_leds

  - id: play_sound
    parameters:
      priority: bool
      sound_file: "audio::AudioFile*"
    then:
      - lambda: |-
          if (priority) {
            id(external_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_STOP)
              .set_announcement(true)
              .perform();
          }
          if ((id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING) || priority) {
            id(external_media_player)->play_file(sound_file, true, false);
          }

  # Включение stop-модели на время длинного TTS
  - id: activate_stop_word_once
    then:
      - delay: 1s
      - micro_wake_word.enable_model: stop
      - wait_until:
          not:
            media_player.is_announcing:
      - micro_wake_word.disable_model: stop

  - id: send_tts_uri_event
    parameters:
      tts_uri: string
    then:
      - homeassistant.event:
          event: esphome.tts_uri
          data:
            uri: !lambda return tts_uri;

  - id: send_stt_text_event
    parameters:
      stt_text: string
    then:
      - homeassistant.event:
          event: esphome.stt_text
          data:
            text: !lambda return stt_text;

select:
  - platform: template
    name: "Wake word sensitivity"
    optimistic: true
    initial_option: Slightly sensitive
    restore_value: true
    entity_category: config
    options:
      - Slightly sensitive
      - Moderately sensitive
      - Very sensitive
    on_value:
      # Настройка меняет только okay_nabu; alexa и stop используют значения из JSON-моделей.
      lambda: |-
        if (x == "Slightly sensitive") {
          id(okay_nabu).set_probability_cutoff(217);
        } else if (x == "Moderately sensitive") {
          id(okay_nabu).set_probability_cutoff(176);
        } else if (x == "Very sensitive") {
          id(okay_nabu).set_probability_cutoff(50);
        }
  - platform: logger
    id: logger_select
    name: Logger Level
    disabled_by_default: true


switch:
  - platform: gpio
    id: amp_enable_8
    name: Amplifier
    icon: mdi:speaker
    entity_category: config
    pin:
      tca9555: ioexp
      number: $amp_ctrl
      inverted: false
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: wake_sound
    name: Wake sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

number:
  - platform: template # MIC DEBUG
    id: mic_gain_db
    name: "Mic Gain (ES7210 dB)"
    entity_category: config
    min_value: 0
    max_value: 42
    step: 1
    restore_value: true
    initial_value: 24
    set_action:
      - lambda: |-
          id(adc_mic).set_mic_gain(x);   // adjust PGA on the fly
      - logger.log:
          format: "[MIC] Set ES7210 gain to %.0f dB"
          args: [ "x" ]

  - platform: template
    id: va_gain_factor
    name: "Gain Factor"
    entity_category: config
    min_value: 1
    max_value: 64
    step: 1
    restore_value: true
    initial_value: 32
    set_action:
      - lambda: |-
          id(va_mic).set_gain_factor(x);   // adjust gain factor on the fly
      - logger.log:
          format: "[MIC] Set gain factor to %.0f"
          args: [ "x" ]

  - platform: template
    id: va_noise_suppression
    name: "Noise Suppression"
    entity_category: config
    min_value: 0
    max_value: 4
    step: 1
    restore_value: true
    initial_value: 4
    set_action:
      - lambda: |-
          id(va).set_noise_suppression_level(x);   // adjust noise suppression on the fly
      - logger.log:
          format: "[MIC] Set suppression to %.0f"
          args: [ "x" ]

  - platform: template
    id: led_ring_brightness
    name: "LED Ring Brightness"
    icon: mdi:brightness-6
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0.4
    max_value: 1.0
    step: 0.05
    initial_value: 0.8
    mode: slider
    on_value:
      - if:
          condition:
            light.is_on: status_ring
          then:
            - light.turn_on:
                id: status_ring
                brightness: !lambda 'return x;'

sensor:
  - platform: uptime
    id: uptime_sensor
    name: "Uptime"
    entity_category: diagnostic
    update_interval: 60s
